services:
  - type: web
    name: swad-restaurant
    runtime: node
    region: singapore  # Closest to India
    plan: free         # Change to "starter" ($7/mo) for always-on
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false    # Set manually in Render dashboard (MongoDB Atlas connection string)
      - key: JWT_SECRET
        sync: false    # Set manually in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false    # Your Render URL or custom domain
