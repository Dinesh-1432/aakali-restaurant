version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: aakali_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: aakali
      MONGO_INITDB_ROOT_PASSWORD: aakali123
      MONGO_INITDB_DATABASE: aakali_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aakali_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Node.js App ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: aakali_app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://aakali:aakali123@mongo:27017/aakali_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-svad_restaurant_super_secret_jwt_key_2024}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-Aakali <noreply@aakali.in>}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - aakali_net

  # ── Mongo Express (DB admin UI) ───────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: aakali_mongo_express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: aakali
      ME_CONFIG_MONGODB_ADMINPASSWORD: aakali123
      ME_CONFIG_MONGODB_URL: mongodb://aakali:aakali123@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - aakali_net

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local

networks:
  aakali_net:
    driver: bridge
